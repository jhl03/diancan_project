<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>供应商报价权限 - PRD与原型对照页</title>
  <style>
    :root {
      --bg: #edf3fb;
      --panel: rgba(255,255,255,0.96);
      --panel-soft: #f8fbff;
      --ink: #142033;
      --muted: #66758b;
      --line: #d7e2ef;
      --accent: #2f80ff;
      --accent-2: #35b7f5;
      --shadow: 0 20px 50px rgba(20,42,74,.12);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(47,128,255,.14), transparent 26%),
        radial-gradient(circle at bottom right, rgba(53,183,245,.12), transparent 26%),
        var(--bg);
      color: var(--ink);
    }
    .shell {
      max-width: 1800px;
      margin: 0 auto;
      padding: 22px 16px 28px;
      display: grid;
      gap: 16px;
    }
    .hero, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .hero {
      padding: 22px 26px;
      display: grid;
      gap: 8px;
    }
    .hero h1 {
      margin: 0;
      font-size: 30px;
      line-height: 1.2;
      font-weight: 800;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
    }
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 4px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid #cfe0ff;
      background: #f5f9ff;
      color: #1d4ed8;
      text-decoration: none;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
    }
    .btn.active {
      color: #fff;
      border-color: #2f80ff;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(320px, var(--left-width, 48%)) 14px minmax(420px, 1fr);
      gap: 0;
      align-items: stretch;
    }
    .resize-bar {
      position: relative;
      cursor: col-resize;
      user-select: none;
      min-height: calc(100vh - 210px);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .resize-bar::before {
      content: "";
      position: absolute;
      inset: 0;
      background: transparent;
    }
    .resize-bar::after {
      content: "";
      width: 4px;
      height: 72px;
      border-radius: 999px;
      background: linear-gradient(180deg, #c7d9f2, #91baf0);
      box-shadow: 0 6px 16px rgba(47, 128, 255, 0.16);
    }
    .layout.dragging,
    .layout.dragging * {
      cursor: col-resize !important;
      user-select: none !important;
    }
    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 14px 18px;
      border-bottom: 1px solid #e6eef8;
    }
    .panel-head h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }
    .panel-body {
      padding: 0;
      height: calc(100vh - 210px);
      min-height: 720px;
    }
    .frame {
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 0 0 var(--radius) var(--radius);
      background: #fff;
    }
    .note {
      font-size: 12px;
      color: var(--muted);
    }
    @media (max-width: 1280px) {
      .layout { grid-template-columns: 1fr; }
      .resize-bar { display: none; }
      .panel-body { height: 800px; min-height: 800px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>供应商报价权限 - PRD与原型对照页</h1>
      <p>用于开发和评审同时查看 PRD 与高保真原型。左侧查看文档规则，右侧查看页面原型，减少来回切换。</p>
      <div class="toolbar">
        <button class="btn active" id="openPrdBtn" type="button">打开PRD</button>
        <button class="btn active" id="openPrototypeBtn" type="button">打开原型</button>
        <a class="btn" href="./prd.html" target="_blank">PRD新标签打开</a>
        <a class="btn" href="./prototype.html" target="_blank">原型新标签打开</a>
      </div>
    </section>

    <section class="layout" id="compareLayout">
      <article class="panel">
        <div class="panel-head">
          <h2>PRD 文档</h2>
          <span class="note">来源：最新浏览版 PRD</span>
        </div>
        <div class="panel-body">
          <iframe class="frame" id="prdFrame" src="./prd.html" title="PRD 文档"></iframe>
        </div>
      </article>

      <div class="resize-bar" id="resizeBar" aria-label="调整左右占比"></div>

      <article class="panel">
        <div class="panel-head">
          <h2>高保真原型</h2>
          <span class="note">来源：当前最新原型页面</span>
        </div>
        <div class="panel-body">
          <iframe class="frame" id="prototypeFrame" src="./prototype.html" title="高保真原型"></iframe>
        </div>
      </article>
    </section>
  </main>

  <script>
    const prdFrame = document.getElementById("prdFrame");
    const prototypeFrame = document.getElementById("prototypeFrame");
    const openPrdBtn = document.getElementById("openPrdBtn");
    const openPrototypeBtn = document.getElementById("openPrototypeBtn");
    const compareLayout = document.getElementById("compareLayout");
    const resizeBar = document.getElementById("resizeBar");
    const leftWidthStorageKey = "compare-page:left-width";

    openPrdBtn.addEventListener("click", () => {
      const hidden = prdFrame.style.display === "none";
      prdFrame.style.display = hidden ? "block" : "none";
      openPrdBtn.classList.toggle("active", hidden);
      openPrdBtn.textContent = hidden ? "隐藏PRD" : "显示PRD";
    });

    openPrototypeBtn.addEventListener("click", () => {
      const hidden = prototypeFrame.style.display === "none";
      prototypeFrame.style.display = hidden ? "block" : "none";
      openPrototypeBtn.classList.toggle("active", hidden);
      openPrototypeBtn.textContent = hidden ? "隐藏原型" : "显示原型";
    });

    function applyStoredLayoutWidth() {
      const saved = localStorage.getItem(leftWidthStorageKey);
      if (!saved) return;
      compareLayout.style.setProperty("--left-width", saved);
    }

    function startResize(startEvent) {
      if (window.innerWidth <= 1280) return;

      compareLayout.classList.add("dragging");
      const layoutRect = compareLayout.getBoundingClientRect();

      function handleMove(moveEvent) {
        const currentX = moveEvent.clientX || (moveEvent.touches && moveEvent.touches[0] ? moveEvent.touches[0].clientX : 0);
        const relativeX = currentX - layoutRect.left;
        const percent = Math.max(28, Math.min(72, (relativeX / layoutRect.width) * 100));
        compareLayout.style.setProperty("--left-width", `${percent}%`);
      }

      function stopResize() {
        compareLayout.classList.remove("dragging");
        const width = getComputedStyle(compareLayout).getPropertyValue("--left-width").trim();
        if (width) {
          localStorage.setItem(leftWidthStorageKey, width);
        }
        window.removeEventListener("mousemove", handleMove);
        window.removeEventListener("mouseup", stopResize);
        window.removeEventListener("touchmove", handleMove);
        window.removeEventListener("touchend", stopResize);
      }

      handleMove(startEvent);
      window.addEventListener("mousemove", handleMove);
      window.addEventListener("mouseup", stopResize);
      window.addEventListener("touchmove", handleMove, { passive: true });
      window.addEventListener("touchend", stopResize, { passive: true });
    }

    resizeBar.addEventListener("mousedown", startResize);
    resizeBar.addEventListener("touchstart", startResize, { passive: true });
    applyStoredLayoutWidth();
  </script>
</body>
</html>
