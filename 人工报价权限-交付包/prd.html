<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PRD 浏览版</title>
  <style>
    :root {
      --bg: #eef4fb;
      --panel: rgba(255,255,255,0.96);
      --ink: #142033;
      --muted: #66758b;
      --line: #d7e2ef;
      --accent: #2f80ff;
      --accent-2: #35b7f5;
      --danger: #b42318;
      --danger-soft: #fff4f1;
      --shadow: 0 20px 50px rgba(20,42,74,.12);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(47,128,255,.14), transparent 26%),
        radial-gradient(circle at bottom right, rgba(53,183,245,.12), transparent 26%),
        var(--bg);
      color: var(--ink);
    }
    .shell {
      max-width: 1420px;
      margin: 0 auto;
      padding: 28px 16px 40px;
      display: grid;
      gap: 18px;
    }
    .hero, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .hero {
      padding: 24px 28px;
      display: grid;
      gap: 10px;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      padding: 4px 10px;
      border-radius: 999px;
      background: #ebf3ff;
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      border: 1px solid #d8e7ff;
    }
    .hero h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.2;
      font-weight: 800;
      letter-spacing: -.02em;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.75;
      max-width: 960px;
    }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 14px;
    }
    .meta-card {
      grid-column: span 3;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px 18px;
      box-shadow: 0 10px 24px rgba(20,42,74,.06);
    }
    .meta-card.wide { grid-column: span 6; }
    .meta-label {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: .02em;
    }
    .meta-value {
      font-size: 14px;
      line-height: 1.7;
      color: var(--ink);
      word-break: break-word;
    }
    .meta-value code {
      padding: 2px 6px;
      border-radius: 8px;
      background: #f3f7fd;
      border: 1px solid #dde8f5;
      color: #27466f;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 12px;
    }
    .change-card {
      grid-column: 1 / -1;
      background: var(--danger-soft);
      border: 1px solid #f2c5bc;
      border-radius: 18px;
      overflow: hidden;
    }
    .change-card summary {
      list-style: none;
      cursor: pointer;
      padding: 16px 18px;
      font-weight: 800;
      color: var(--danger);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .change-card summary::-webkit-details-marker { display: none; }
    .change-card summary::after {
      content: '展开';
      font-size: 12px;
      font-weight: 700;
      color: var(--danger);
      background: rgba(180,35,24,.08);
      border: 1px solid rgba(180,35,24,.14);
      border-radius: 999px;
      padding: 4px 10px;
    }
    .change-card details[open] summary::after { content: '收起'; }
    .change-body {
      padding: 0 18px 18px;
      border-top: 1px solid rgba(180,35,24,.1);
    }
    .change-body ul {
      margin: 14px 0 0;
      padding-left: 20px;
      color: #7f2d22;
      line-height: 1.8;
      font-size: 13px;
    }
    .layout {
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
      gap: 18px;
      align-items: start;
    }
    .doc-panel { padding: 26px 30px; }
    .toc-panel {
      position: sticky;
      top: 16px;
      padding: 18px;
    }
    .toc-panel h3 {
      margin: 0 0 12px;
      font-size: 15px;
    }
    .toc-list {
      display: grid;
      gap: 8px;
    }
    .toc-link {
      display: block;
      padding: 8px 10px;
      border-radius: 10px;
      background: #f7fbff;
      border: 1px solid #e1eaf6;
      color: #30507f;
      text-decoration: none;
      font-size: 13px;
      line-height: 1.5;
    }
    .doc-content h2,
    .doc-content h3,
    .doc-content h4 {
      margin: 0;
      scroll-margin-top: 18px;
    }
    .doc-content h2 {
      margin-top: 30px;
      padding-bottom: 12px;
      border-bottom: 1px solid #e6eef8;
      font-size: 28px;
      font-weight: 800;
      color: #0f2747;
    }
    .doc-content h3 {
      margin-top: 22px;
      font-size: 20px;
      font-weight: 800;
      color: #123764;
    }
    .doc-content h4 {
      margin-top: 18px;
      font-size: 16px;
      font-weight: 800;
      color: #1e4f83;
    }
    .doc-content h2 span,
    .doc-content h3 span,
    .doc-content h4 span,
    .doc-content p span,
    .doc-content li span,
    .meta-value span,
    .change-body span {
      display: inline;
    }
    .doc-content p {
      margin: 10px 0 0;
      font-size: 14px;
      line-height: 1.85;
      color: #26384f;
    }
    .doc-content ul {
      margin: 12px 0;
      padding-left: 22px;
      color: #26384f;
    }
    .doc-content li {
      margin: 8px 0;
      line-height: 1.8;
      font-size: 14px;
    }
    .doc-content li .li-note {
      margin-top: 4px;
      color: #53647a;
      font-size: 13px;
    }
    .doc-content strong { color: #102946; }
    .doc-content code {
      padding: 2px 6px;
      border-radius: 8px;
      background: #f3f7fd;
      border: 1px solid #dde8f5;
      color: #27466f;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 12px;
    }
    .doc-content .prd-inline-image {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 14px 0;
      border-radius: 16px;
      border: 1px solid #dde8f5;
      box-shadow: 0 8px 22px rgba(23, 53, 95, 0.08);
      background: #fff;
    }
    .doc-content .prd-inline-image[data-size="small"] {
      width: min(240px, 100%);
    }
    .doc-content .prd-inline-image[data-size="medium"] {
      width: min(420px, 100%);
    }
    .doc-content .prd-inline-image[data-size="large"] {
      width: min(680px, 100%);
    }
    .doc-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0 18px;
      overflow: hidden;
      border-radius: 16px;
      border: 1px solid #dfe8f3;
      font-size: 13px;
    }
    .doc-content thead th {
      background: #f6faff;
      color: #17355f;
      font-weight: 800;
    }
    .doc-content th,
    .doc-content td {
      border: 1px solid #e4edf7;
      padding: 10px 12px;
      text-align: left;
      vertical-align: top;
      line-height: 1.7;
    }
    .doc-content blockquote {
      margin: 14px 0;
      padding: 14px 16px;
      border-left: 4px solid #9ec5ff;
      background: #f7fbff;
      border-radius: 14px;
      color: #33527b;
    }
    .doc-content pre.code-block {
      margin: 14px 0 18px;
      padding: 16px 18px;
      border-radius: 16px;
      background: #0f172a;
      color: #dbeafe;
      overflow: auto;
      line-height: 1.7;
      font-size: 13px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .code-title {
      margin-bottom: 8px;
      display: inline-flex;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      color: #93c5fd;
      font-size: 12px;
      font-weight: 700;
    }
    .mermaid-shell {
      margin: 14px 0 18px;
      padding: 18px;
      border-radius: 16px;
      border: 1px solid #e3ecf8;
      background: linear-gradient(180deg, #fbfdff, #f6faff);
      overflow: auto;
    }
    .mermaid-diagram { min-height: 120px; }
    .mermaid-error {
      padding: 14px 16px;
      border-radius: 14px;
      background: #fff4f1;
      border: 1px solid #f2c5bc;
      color: #8a2f22;
      line-height: 1.8;
      font-size: 13px;
    }
    .mermaid-error strong {
      display: block;
      margin-bottom: 4px;
      color: #b42318;
    }
    @media (max-width: 1100px) {
      .meta-card { grid-column: span 6; }
      .layout { grid-template-columns: 1fr; }
      .toc-panel { position: static; }
    }
    @media (max-width: 760px) {
      .shell { padding: 16px 12px 28px; }
      .hero, .doc-panel { padding: 18px; }
      .meta-card, .meta-card.wide { grid-column: 1 / -1; }
      .hero h1 { font-size: 26px; }
      .doc-content h2 { font-size: 24px; }
      .doc-content h3 { font-size: 18px; }
    }
  </style>
</head>

  <main class="shell">
    <section class="hero">
      <div class="badge">PRD 浏览版</div>
      <h1 id="heroTitle">产品需求文档</h1>
      <p>这是正式基线内容生成的浏览器预览页。内容来源与在线编辑器保存到基线的版本保持同步。</p>

      </aside>
      <article class="panel doc-panel">
        <div class="doc-content" id="docContent"></div>
      </article>
    </section>
  </main>

### 1.1 需求背景
部分供应商使用人工出餐，但会出现未及时注意新进订单、错过出餐时间的情况，导致订单进入“超时未处理”状态。该类问题会降低供应商出餐成功率，并影响平台整体出餐成功率。

### 1.2 功能变化
- 系统自动开启/关闭人工报价权限功能
- 报价权限状态变更后的公众号提醒能力
- 支撑运营监控的供应商出餐数据看板能力
- 可追溯的系统操作原因

## 2. 整体功能描述

### 2.1 系统自动开启/关闭人工报价权限
系统按供应商维度统计连续失败订单数。当同一供应商连续失败达到系统配置阈值时，系统自动关闭该供应商报价权限指定时长。
- 失败状态包括：**超时未处理**
- 连续失败单数阈值与暂停人工报价权限时长不写死，统一读取“<span style="color:#b42318;">人工报价权限配置</span>”

### 2.2 公众号提醒
报价权限状态发生变化时，系统需向对应供应商已关注的公众号账号发送提醒消息。供应商与接收消息的公众号账号为 1:1 关系，仅向被操作的供应商发送消息。

### 2.4 供应商出餐数据
在点餐后台提供供应商出餐数据看板，支持按时间范围，供应商名称、供应商编号搜索，展示**供应商编号、供应商名称、接单数量、出餐数量、超时未处理、出餐失败、出餐成功率与平均出餐时长**。看板默认展示近 1 个月数据，按整点更新。

## 4. 核心业务流程

### 4.1 系统自动关闭人工自动报价流程
订单状态更新为超时状态 -> 系统读取“人工报价权限配置” -> 按供应商维度统计连续失败数量 -> 若连续超时达到配置阈值则自动关闭报价权限配置时长 -> 记录日志 -> 发送公众号提醒 -> 进入配置时长限制期

### 4.2 系统自动开启人工自动报价流程
供应商处于系统自动停止报价期间 -> 到达限制结束时间 -> 系统自动开启报价权限 -> 清零连续失败计数 -> 记录日志 -> 发送公众号提醒

### 4.3 看板查询流程
整点任务生成统计结果 -> 用户进入看板 -> 默认展示近 1 个月数据 -> 用户按时间、供应商名称及供应商编号筛选 -> 系统返回对应统计结果

```mermaid

    A[订单状态变化] --> B{是否为超时未出餐\n或出餐失败}
    B -->|否| C[结束]
    B -->|是| D[按供应商统计连续失败数量]
    D --> E{连续失败是否达到配置阈值}

## 5. 核心业务规则

### 5.1 失败状态定义
仅当订单状态为以下任一状态时，计入失败订单：
- 超时未处理

### 5.2 连续失败统计维度
连续失败按供应商维度统计。

### 5.3 系统自动关闭人工报价权限触发条件
同一供应商连续失败达到“人工报价权限配置”中的连续失败单数阈值后，系统自动关闭该供应商人工报价权限；关闭时长取“人工报价权限配置”中的暂停人工报价权限时长。

### 5.3.1 人工报价权限配置规则
- 配置入口：点餐后台 - 运营管理 - 系统配置项
- 配置标题：人工报价权限配置
- 配置字段：
  - 连续失败单数阈值
  - 暂停人工报价权限时长（小时）
- 系统统计、自动停报、公众号提醒统一读取该配置，不允许在规则逻辑里写死

### 5.4 连续失败计数清零规则
- 系统自动开启报价权限后，连续失败计数清零并重新开始统计

- 系统自动关闭人工报价权限
- 系统自动开启人工报价权限

          }
          if (nested || /^(#{2,4}\s+|```|\|)/.test(lines[index])) break;
          itemHtml += `<div class="li-note">${renderInline(lines[index].trim())}</div>`;
          index += 1;
        }
        html += `<li>${itemHtml}</li>`;
      }
      html += "</ul>";
      return { html, nextIndex: index };
    }

    function renderCodeBlock(language, content) {
      if (language === "mermaid") {
        return `<div class="mermaid-shell"><div class="mermaid-diagram" data-mermaid-source="${escapeHtml(encodeURIComponent(content))}"></div></div>`;
      }
      const title = language ? `${language} 代码块` : "代码块";
      return `<pre class="code-block"><span class="code-title">${escapeHtml(title)}</span>\n${escapeHtml(content)}</pre>`;
    }

    function renderBlocks(lines) {
      let html = "";
      let index = 0;
      const toc = [];
      while (index < lines.length) {
        const line = lines[index];
        if (!line.trim()) { index += 1; continue; }
        const heading = line.match(/^(##{1,3})\s+(.+)$/);
        if (heading) {
          const level = heading[1].length;
          const text = heading[2].trim();
          const id = slugify(text);
          if (level === 2) toc.push({ level, text, id });
          const tag = level === 2 ? "h2" : level === 3 ? "h3" : "h4";
          html += `<${tag} id="${id}">${renderInline(text)}</${tag}>`;
          index += 1;
          continue;
        }
        if (/^```/.test(line.trim())) {
          const language = line.trim().slice(3).trim();
          index += 1;
          const codeLines = [];
          while (index < lines.length && !/^```/.test(lines[index].trim())) {
            codeLines.push(lines[index]);
            index += 1;
          }
          index += 1;
          html += renderCodeBlock(language, codeLines.join("\n").trim());
          continue;
        }
        if (/^\|/.test(line.trim()) && lines[index + 1] && isTableDivider(lines[index + 1])) {
          const tableResult = renderTable(lines, index);
          html += tableResult.html;
          index = tableResult.nextIndex;
          continue;
        }
        const listMatch = line.match(/^(\s*)-\s+(.*)$/);
        if (listMatch) {
          const listResult = renderList(lines, index, listMatch[1].length);
          html += listResult.html;
          index = listResult.nextIndex;
          continue;
        }
        const paragraphLines = [line];
        index += 1;
        while (
          index < lines.length &&
          lines[index].trim() &&
          !/^(##{1,3})\s+/.test(lines[index]) &&
          !/^```/.test(lines[index].trim()) &&
          !(/^\|/.test(lines[index].trim()) && lines[index + 1] && isTableDivider(lines[index + 1])) &&
          !/^(\s*)-\s+/.test(lines[index])
        ) {
          paragraphLines.push(lines[index]);
          index += 1;
        }
        html += `<p>${renderInline(paragraphLines.join("<br>").trim())}</p>`;
      }
      return { html, toc };
    }

    function renderMeta(meta) {
      const metaGrid = document.getElementById("metaGrid");
      metaGrid.innerHTML = "";
      const normalKeys = ["文档状态", "当前版本", "基线文件", "上次更新时间", "在线编辑入口", "协作方式"];
      const metaMap = new Map(meta.map(item => [item.key, item.value]));
      normalKeys.forEach((key) => {
        const value = metaMap.get(key);
        if (!value) return;
        const card = document.createElement("section");
        card.className = key === "协作方式" || key === "在线编辑入口" ? "meta-card wide" : "meta-card";
        card.innerHTML = `<span class="meta-label">${escapeHtml(key)}</span><div class="meta-value">${renderInline(value)}</div>`;
        metaGrid.appendChild(card);
      });
      const summaryValue = metaMap.get("本次变更摘要");
      if (summaryValue) {
        const chunks = summaryValue.split(/(?=更新时间：)/g).map(item => item.trim()).filter(Boolean);
        const block = document.createElement("section");
        block.className = "change-card";
        block.innerHTML = `<details><summary>本次变更摘要</summary><div class="change-body"><ul>${chunks.map(item => `<li>${renderInline(item)}</li>`).join("")}</ul></div></details>`;
        metaGrid.appendChild(block);
      }
    }

    function renderToc(toc) {
      const tocList = document.getElementById("tocList");
      tocList.innerHTML = toc.map(item => `<a class="toc-link" href="#${item.id}">${escapeHtml(item.text)}</a>`).join("");
    }

    let mermaidApi = null;
    let mermaidLoadPromise = null;
    let mermaidRenderSequence = 0;

    function renderMermaidError(container, error) {
      const detail = error && error.message ? `<div>${escapeHtml(error.message)}</div>` : "";
      container.innerHTML = `<div class="mermaid-error"><strong>流程图暂时无法显示</strong><div>这段 Mermaid 内容渲染失败，请检查图表语法。</div>${detail}</div>`;
    }

    async function loadMermaidLibrary() {
      if (mermaidApi) return mermaidApi;
      if (mermaidLoadPromise) return mermaidLoadPromise;
      mermaidLoadPromise = new Promise((resolve, reject) => {
        const finalize = () => {
          try {
            const api = window.mermaid;
            if (!api) {
              reject(new Error("未找到 Mermaid 图表引擎"));
              return;
            }
            api.initialize({ startOnLoad: false, securityLevel: "loose", theme: "default" });
            mermaidApi = api;
            resolve(api);
          } catch (error) {
            reject(error);
          }
        };
        if (window.mermaid) {
          finalize();
          return;
        }
        const script = document.createElement("script");
        script.src = "https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js";
        script.async = true;
        script.addEventListener("load", finalize, { once: true });
        script.addEventListener("error", () => reject(new Error("Mermaid 图表引擎加载失败")), { once: true });
        document.head.appendChild(script);
      });
      try {
        return await mermaidLoadPromise;
      } catch (error) {
        mermaidLoadPromise = null;
        throw error;
      }
    }

    async function renderMermaidDiagrams() {
      const targets = Array.from(document.querySelectorAll(".mermaid-diagram"));
      if (!targets.length) return;
      let api;
      try {
        api = await loadMermaidLibrary();
      } catch (error) {
        targets.forEach((target) => renderMermaidError(target, error));
        return;
      }
      for (const target of targets) {
        const encodedSource = target.dataset.mermaidSource || "";
        const source = encodedSource ? decodeURIComponent(encodedSource) : "";
        if (!source.trim()) {
          renderMermaidError(target, new Error("Mermaid 内容为空"));
          continue;
        }
        try {
          const renderId = `prd-mermaid-${++mermaidRenderSequence}`;
          const result = await api.render(renderId, source);
          target.innerHTML = result.svg;
        } catch (error) {
          renderMermaidError(target, error);
        }
      }
    }

    function openHandleDb() {
      if (!("indexedDB" in window)) return Promise.resolve(null);
      return new Promise((resolve) => {
        try {
          const request = indexedDB.open(baselineHandleDbName, 1);
          request.onupgradeneeded = () => {
            const db = request.result;
            if (!db.objectStoreNames.contains(baselineHandleStoreName)) {
              db.createObjectStore(baselineHandleStoreName);
            }
          };
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => resolve(null);
        } catch (error) {
          resolve(null);
        }
      });
    }

    async function restoreBaselineHandle() {
      const db = await openHandleDb();
      if (!db) return null;
      const handle = await new Promise((resolve) => {
        try {
          const tx = db.transaction(baselineHandleStoreName, "readonly");
          const request = tx.objectStore(baselineHandleStoreName).get(baselineHandleStoreKey);
          request.onsuccess = () => resolve(request.result || null);
          request.onerror = () => resolve(null);
        } catch (error) {
          resolve(null);
        }
      });
      db.close();
      return handle;
    }

    async function resolveLatestMarkdown() {
      const handle = await restoreBaselineHandle();
      if (handle) {
        try {
          const readPermission = await handle.queryPermission({ mode: "read" });
          const readwritePermission = await handle.queryPermission({ mode: "readwrite" });
          if (readPermission === "granted" || readwritePermission === "granted") {
            const file = await handle.getFile();
            return (await file.text()).replace(/\uFEFF/g, "");
          }
        } catch (error) {
        }
      }
      const cached = localStorage.getItem(lastSavedBaselineCacheKey);
      if (cached) return cached;
      return fallbackMarkdown;
    }

    async function renderDocument(markdownText) {
      const parsed = parseFrontMatter(markdownText);
      document.title = parsed.title || "PRD 浏览版";
      document.getElementById("heroTitle").textContent = parsed.title || "产品需求文档";
      renderMeta(parsed.meta);
      const rendered = renderBlocks(parsed.lines);
      document.getElementById("docContent").innerHTML = rendered.html;
      renderToc(rendered.toc);
      await renderMermaidDiagrams();
    }

    async function refreshFromLatestSource() {
      const latestMarkdown = await resolveLatestMarkdown();
      await renderDocument(latestMarkdown);
    }

    window.addEventListener("storage", async (event) => {
      if (event.key === lastSavedBaselineCacheKey && event.newValue) {
        await renderDocument(event.newValue);
      }
    });
    window.addEventListener("focus", () => { void refreshFromLatestSource(); });
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        void refreshFromLatestSource();
      }
    });

    void refreshFromLatestSource();
  </script>
</body>
</html>
