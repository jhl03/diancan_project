<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>订单分配规则优化 - 交付包</title>
  <style>
    :root {
      --bg: #eef5f2;
      --panel: #ffffff;
      --ink: #17302a;
      --muted: #68807a;
      --line: #d6e3df;
      --accent: #1f8f6a;
      --accent-2: #36b08a;
      --shadow: 0 20px 50px rgba(23, 48, 42, 0.12);
      --radius: 24px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(31, 143, 106, 0.14), transparent 28%),
        radial-gradient(circle at bottom right, rgba(54, 176, 138, 0.12), transparent 24%),
        var(--bg);
      display: flex;
      justify-content: center;
      padding: 36px 18px;
    }
    .shell {
      width: min(1100px, 100%);
      display: grid;
      gap: 20px;
    }
    .hero, .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .hero {
      padding: 28px 30px;
      display: grid;
      gap: 10px;
    }
    .hero h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.15;
      letter-spacing: -0.03em;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }
    .card {
      padding: 22px;
      display: grid;
      gap: 14px;
    }
    .card h2 {
      margin: 0;
      font-size: 20px;
    }
    .meta {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }
    .links {
      display: grid;
      gap: 10px;
    }
    .link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      border: 1px solid #cde8de;
      color: #136b4f;
      background: #effaf6;
      transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
    }
    .link:hover {
      transform: translateY(-1px);
      box-shadow: 0 10px 24px rgba(31, 143, 106, 0.16);
      background: #e4f6ef;
    }
    .link.primary {
      color: #fff;
      border-color: #1f8f6a;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }
    .tip {
      padding: 16px 18px;
      border-radius: 18px;
      background: #f5fbf8;
      border: 1px dashed #c8ddd5;
      color: #4c6861;
      font-size: 13px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <h1>订单分配规则优化 - 交付包</h1>
      <p>这里是整理后的 PRD 交付包。适合直接发给研发、评审或本地归档使用。该版本已内嵌正文内容，离开本地预览服务后也可以单独打开浏览。</p>
    </section>
    <section class="grid">
      <article class="card">
        <h2>PRD 浏览版</h2>
        <div class="meta">浏览器可直接打开的可视化 PRD 版本，保留目录导航与流程图展示。</div>
        <div class="links">
          <a class="link primary" href="./prd.html" target="_self">打开 PRD</a>
        </div>
      </article>
      <article class="card">
        <h2>正式基线 Markdown</h2>
        <div class="meta">用于留档或继续维护的正式 Markdown 基线副本。</div>
        <div class="links">
          <a class="link primary" href="./订单分配规则优化-PRD.md" target="_self">打开 Markdown</a>
        </div>
      </article>
    </section>
    <section class="tip">
      使用说明：
      1. 直接打开 <code>index.html</code> 可进入统一入口。
      2. 只看 PRD 时，打开 <code>prd.html</code>。
      3. 这是一份静态交付包；如果正式 PRD 基线后续继续修改，需要重新同步交付包内容。
    </section>
  </main>
</body>
</html>
